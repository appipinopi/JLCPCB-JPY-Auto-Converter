<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>JLCPCB Converter Settings</title>
  <style>
    body { padding: 20px; font-family: sans-serif; }
    input { width: 300px; padding: 5px; }
    button { padding: 5px 15px; cursor: pointer; background: #3b95ee; color: white; border: none; border-radius: 4px; }
  </style>
</head>
<body>
  <h2>JLCPCB 円換算設定</h2>
  <p>ForexRateAPIのキーを入力してください:</p>
  <input type="text" id="apiKey" placeholder="94e217..."><br><br>
  <button id="save">保存する</button>
  <p id="status"></p>

  <script>
    const saveBtn = document.getElementById('save');
    const input = document.getElementById('apiKey');
    const status = document.getElementById('status');

    // 保存済みキーを読み込み
    chrome.storage.local.get(['apiKey'], (res) => {
      if (res.apiKey) input.value = res.apiKey;
    });

    saveBtn.onclick = () => {
      chrome.storage.local.set({ apiKey: input.value }, () => {
        status.textContent = '保存しました！ページをリロードしてください。';
        setTimeout(() => status.textContent = '', 2000);
      });
    };
  </script>
</body>
</html>
